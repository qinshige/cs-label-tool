<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>wipe 组件</title>
    <meta name="viewport"
        content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <style>
        #canvas1 {
            position: absolute;
            /* background-image: url("https://img6.bdstatic.com/img/image/pcindex/sunjunpchuazhoutu.JPG"); */
            z-index: 997;
        }

        #canvas2 {
            position: absolute;
            /* background-image: url("https://img6.bdstatic.com/img/image/pcindex/sunjunpchuazhoutu.JPG"); */
            z-index: 998;
        }

        .tooltip-pen {
            position: fixed;
            width: 40px;
            height: 125px;
            top: 5%;
            left: 650px;
            z-index: 999;
            background-color: #737373;
            border-radius: 5px;
        }

        .ico {
            display: inline-block;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>

</head>

<body>
    <!-- <canvas id="canvas1"></canvas>
    <canvas id="canvas2"></canvas> -->
    <div id="main"></div>
    <div class="tooltip-pen">
        <b>
            <i class="ico ico-pen" title="铅笔" onclick="changeTools('pen');">铅笔</i>
            <i class="ico ico-eraser" title="橡皮檫" onclick="changeTools('eraser');">橡皮檫</i>
            <i class="ico ico-save" title="保存" onclick="downloadImg();">保存</i>
        </b>
</body>

</html>
<script src="./js/wipe.js"></script>
<script>
    var canvas1 = document.getElementById('canvas1');
    var ctx1 = canvas1.getContext("2d");
    var canvas2 = document.getElementById('canvas2');
    var ctx2 = canvas2.getContext("2d");
    var image = new Image();
    image.src = "./img/a.jpg";
    image.onload = () => {
        canvas1.width = image.width;
        canvas1.height = image.height;
        ctx1.drawImage(image, 0, 0);
        canvas2.width = image.width;
        canvas2.height = image.height;
        ctx2.drawImage(image, 0, 0);
    }
</script>
