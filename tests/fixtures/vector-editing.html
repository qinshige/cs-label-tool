<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vector editing fixture</title>
  </head>
  <body style="margin: 0">
    <button id="select" type="button">Select</button>
    <button id="polygon" type="button">Polygon</button>
    <div id="app" style="width: 800px; height: 600px"></div>
    <script type="module">
      import {
        addLabel,
        addPolygon,
        addRect,
        createAnnotator,
        createStandardImageSource,
        getSelection,
        getSnapshot,
        imageToClient,
        redo,
        setImageSource,
        undo,
        usePolygon,
        useSelect,
        zoomTo,
      } from '/src/index.ts'

      const container = document.querySelector('#app')
      const annotator = createAnnotator({ container })
      addLabel(annotator, {
        id: 'object',
        name: 'Object',
        color: '#1677ff',
      })
      const image = 'data:image/svg+xml,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800"><rect width="100%" height="100%" fill="white"/></svg>',
      )
      await setImageSource(annotator, createStandardImageSource(image))
      const rectId = addRect(annotator, {
        labelId: 'object', x: 100, y: 100, width: 200, height: 150,
      })
      const polygonId = addPolygon(annotator, {
        labelId: 'object',
        points: [{ x: 500, y: 100 }, { x: 600, y: 100 }, { x: 550, y: 220 }],
      })

      document.querySelector('#select').addEventListener('click', () => useSelect(annotator))
      document.querySelector('#polygon').addEventListener('click', () => usePolygon(annotator))
      window.vectorTest = {
        ids: { rectId, polygonId },
        pointToClient: point => imageToClient(annotator, point),
        snapshot: () => getSnapshot(annotator),
        selection: () => getSelection(annotator),
        undo: () => undo(annotator),
        redo: () => redo(annotator),
        zoom: scale => zoomTo(annotator, scale),
      }
      document.documentElement.dataset.ready = 'true'
    </script>
  </body>
</html>
