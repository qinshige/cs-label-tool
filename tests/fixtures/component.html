<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Component fixture</title>
  </head>
  <body style="margin: 0">
    <div id="app" style="width: 800px; height: 600px"></div>
    <script type="module">
      import {
        addLabel,
        createStandardImageSource,
        getSnapshot,
        getZoom,
        mountAnnotator,
        setImageSource,
        unmountAnnotator,
      } from '/src/index.ts'

      const annotator = mountAnnotator('#app', { historyLimit: 100 })
      addLabel(annotator, {
        id: 'person',
        name: 'Person',
        color: '#ff4d4f',
      })
      const editor = document.querySelector('cs-annotator')
      window.controlsDisabledBeforeImage = [
        'Rectangle',
        'Polygon',
        'Zoom in',
        'Zoom out',
        'Fit',
      ].every(name => editor.shadowRoot.querySelector(`[aria-label="${name}"]`)?.disabled)
      const image = 'data:image/svg+xml,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800"><rect width="100%" height="100%" fill="white"/></svg>',
      )
      await setImageSource(annotator, createStandardImageSource(image))
      window.testAnnotator = annotator
      window.getTestSnapshot = () => getSnapshot(annotator)
      window.getTestZoom = () => getZoom(annotator)
      window.unmountTestAnnotator = () => unmountAnnotator('#app')
      document.documentElement.dataset.ready = 'true'
    </script>
  </body>
</html>
