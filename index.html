<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>绘制组件</title>
    <meta name="viewport"
        content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <style>
        .tooltip-pen {
            position: fixed;
            width: 40px;
            height: 125px;
            top: 5%;
            left: 650px;
            z-index: 999;
            background-color: #737373;
            border-radius: 5px;
        }
    </style>

</head>

<body>
    <div id="main"></div>
    <div class="tooltip-pen">
        <b>
            <input type="button" value="铅笔" onclick="dosave('pen');" />
            <input type="button" value="橡皮檫" onclick="dosave('eraser');" />
            <input type="button" value="橡皮檫" onclick="dosave('save');" />
        </b>
    </div>
    <script type="module">
        import AiLabel from "./js/label.js";
        // 切换
        function initMap() {
            AiLabel.initMap({
                el: "#main",
                src: "./img/b.jpg",
            })
        }
        initMap();
        window.dosave = (val) => {
            console.log(val)
            AiLabel.changeTools(val)
        }
    </script>

</body>

</html>
