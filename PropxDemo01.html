<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script type="module">
      import { computed, ref, watch } from './js/reactive/vue.js'
      const obj = ref({
        num1: 12,
        num2: 13,
      })
      watch(
        () => obj.num1,
        (newVal, oldVal) => {
          console.log('数据变化', newVal, oldVal)
        },
        {
          immediate: true,
        }
      )
      watch(obj.num1, (newVal, oldVal) => {
        console.log('数据变化2', newVal, oldVal)
      })
      const sum = computed(() => obj.num1 + obj.num2)
      // 模拟更新数据 触发计算属性 以及 watch 监听
      setTimeout(() => {
        obj.num1 = 8
        console.log('---sfc-wwwfe----', obj, sum.value)
      }, 2000)
      setTimeout(() => {
        obj.num1 = 2
        console.log('---sfc-wwwfe----', obj, sum.value)
      }, 3000)
    </script>
  </body>
</html>
