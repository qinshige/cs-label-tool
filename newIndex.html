<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>绘制组件</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        
        .text {
            width: 100%;
            height: 100%;
            font-size: 8px;
            cursor: pointer;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        
        #polygon {
            /* transform: rotate(45deg); 
            transform-origin: 50% 50%; */
        }
        
        #neirong {
            display: block;
            transition: all .2s;
        }
        
        .tooltip-pen {
            position: fixed;
            width: 40px;
            height: 125px;
            top: 5%;
            left: 650px;
            z-index: 1000;
            color: #1eff00;
            background-color: rgba(255, 255, 255, 0);
            border-radius: 5px;
        }
        
        #svg_body {
            width: 100%;
            height: 100%;
            position: absolute;
            margin: auto;
        }
        /* .edit {
            display: none;
            transition: all .2s;
        } */
    </style>
</head>

<body>
    <div class="tooltip-pen">
        <b>
            <input type="button" value="铅笔" onclick="dosave('pen');" />
            <input type="button" value="橡皮檫" onclick="dosave('eraser');" />
            <input type="button" value="Base64图片" onclick="dosave('save');" />
            <input type="button" value="绘制矩形" onclick="dosave('rect');" />
            <input type="button" value="设置样式" onclick="changeStyle()" />
        </b>
    </div>
    <div id="svg_body">

    </div>
    <script type="module">
        import AiLabel from "./js/newLabel.js"; 
        AiLabel.initMap({
            el: "#svg_body"
        })

    </script>


</body>

</html>
